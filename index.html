<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></head>
<body>
    <header>
        <h1>Todo List</h1>
    </header>
    <section class="container">
        <div class="form-container">
            <form class="todo-form">
                <input type="text" class="todo-input">
                <button class="todo-button" type="submit">
                    <i class="fas fa-plus-circle"></i>
                </button>
            </form>
            <div class="select">
                <select name="todos"class="filter-todos">
                    <option value="all">all</option>
                    <option value="completed">completed</option>
                    <option value="uncompleted">uncompleted</option>
                </select>
            </div>
        </div>
        <div class="todo-container">
            <ul class="todolist">
                <li class="todo" style="display: flex; align-items: center; gap: 10px; border: 1px solid black; width: fit-content; padding: 10px 20px; border-radius: 8px;">
                    <p class="todo__title">todo #1</p>
                    <span class="todo__createdAt">1402/1/28</span>
                    <button><i class="todo__check far fa-check-square"></i></button>
                    <button><i class="todo__remove far fa-trash-alt"></i></button>
                </li>
            </ul>
        </div>
    </section>
    <script src="todolist.js"></script>
</body>
</html>
